spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/riskdetector}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    properties:
      hibernate:
        default_schema: prod
    hibernate:
      ddl-auto: update # 테이블이 없을 경우 자동으로 생성하도록 변경
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://riskdetectorpeuronteuendeu.onrender.com}

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:https://riskdetectorpeuronteuendeu.onrender.com/oauth2/callback}
  cookie:
    secure: ${COOKIE_SECURE:true}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  s3:
    service-bucket: ${AWS_S3_BUCKET:risk-detector-myongji}
  lambda:
    ocr-function-name: ${AWS_LAMBDA_OCR_FUNCTION:detector_ocr_lambda}
    analysis-function-name: ${AWS_LAMBDA_ANALYSIS_FUNCTION:detector_bedrock_lambda}

# 임시 디버그 로그 (401 원인 파악 후 제거)
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.access: DEBUG
    org.springframework.web.cors: DEBUG
    com.riskdetector: DEBUG
