version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: riskdetector-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riskdetector}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
