<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RD Web · Interactive</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f2f4f6; --paper: #fff; --paper-2: #fbfbfc; --ink: #191f28; --ink-2: #4e5968; --ink-3: #8b95a1;
    --line: #e5e8eb; --line-2: #f2f4f6;
    --navy: #0b3d91; --navy-2: #1b64da; --navy-soft: #eaf1fd;
    --risk-hi: #d93a3a; --risk-hi-bg: #fdecec;
    --risk-md: #e0930f; --risk-md-bg: #fdf3e0;
    --risk-lo: #2ca66a; --risk-lo-bg: #e8f6ef;
    --shadow-1: 0 1px 2px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-2: 0 8px 40px rgba(0,0,0,0.08);
  }
  [data-theme="dark"] {
    --bg: #0a0f1a; --paper: #131a27; --paper-2: #0f1622; --ink: #e6eaf0; --ink-2: #a2adbd; --ink-3: #6b7789;
    --line: #23303f; --line-2: #1b2432;
    --navy-2: #3b7bf0; --navy: #5a94f5; --navy-soft: rgba(59,123,240,0.12);
    --risk-hi-bg: rgba(217,58,58,0.15); --risk-md-bg: rgba(224,147,15,0.15); --risk-lo-bg: rgba(44,166,106,0.15);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--ink); font-family: 'Pretendard', sans-serif; letter-spacing: -0.01em; -webkit-font-smoothing: antialiased; transition: background 240ms ease, color 240ms ease; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* App shell: sidebar + main + optional context */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .app.with-ctx { grid-template-columns: 240px 1fr 360px; }
  @media (max-width: 1100px) { .app.with-ctx { grid-template-columns: 200px 1fr; } .ctx { display: none; } }

  /* Sidebar */
  .side { background: var(--paper-2); border-right: 1px solid var(--line); padding: 22px 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto; transition: background 240ms ease, border-color 240ms ease; }
  .side .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; padding: 0 8px 24px; display: flex; align-items: center; justify-content: space-between; }
  .side .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--navy-2); }
  .navitem { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; color: var(--ink-2); cursor: pointer; font-weight: 500; transition: background 120ms ease, color 120ms ease; white-space: nowrap; }
  .navitem:hover { background: var(--line-2); color: var(--ink); }
  .navitem.on { background: var(--navy-soft); color: var(--navy-2); font-weight: 700; }
  .section-title { font-size: 10px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; padding: 16px 12px 8px; }
  .recent-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 12px; color: var(--ink-2); border-radius: 8px; cursor: pointer; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-item:hover { background: var(--line-2); color: var(--ink); }
  .recent-item.on { color: var(--ink); font-weight: 700; }
  .recent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Main */
  .main { padding: 28px 40px; max-width: 100%; overflow-x: hidden; }
  .main.narrow { max-width: 820px; margin: 0 auto; }
  .page-enter { animation: fadeUp 220ms ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Shared components */
  .card { background: var(--paper); border-radius: 14px; padding: 18px; border: 1px solid var(--line); transition: background 240ms ease, border-color 240ms ease; }
  .card-dark { background: #0d1524; color: #fff; border-radius: 16px; padding: 20px; border: none; }
  [data-theme="dark"] .card-dark { background: #1b2432; }
  .card-hover { transition: transform 120ms ease, box-shadow 120ms ease; cursor: pointer; }
  .card-hover:hover { transform: translateY(-2px); box-shadow: var(--shadow-1); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; background: var(--navy-2); color: #fff; border: none; cursor: pointer; font-family: inherit; transition: background 120ms ease; white-space: nowrap; }
  .btn:hover { background: var(--navy); }
  .btn-ghost { background: var(--line-2); color: var(--ink); }
  .btn-ghost:hover { background: var(--line); }
  .btn-white { background: #fff; color: #191f28; }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }
  .btn-lg { padding: 14px 20px; font-size: 15px; }

  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 999px; background: var(--line-2); color: var(--ink-2); font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: background 120ms; }
  .pill:hover { background: var(--line); }
  .pill.on { background: var(--navy-soft); color: var(--navy-2); font-weight: 600; }

  .risk-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .risk-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .risk-hi { color: var(--risk-hi); background: var(--risk-hi-bg); }
  .risk-md { color: var(--risk-md); background: var(--risk-md-bg); }
  .risk-lo { color: var(--risk-lo); background: var(--risk-lo-bg); }

  .hl-hi { background: var(--risk-hi-bg); box-shadow: inset 0 -2px 0 var(--risk-hi); padding: 2px 3px; border-radius: 2px; cursor: pointer; transition: filter 120ms; }
  .hl-hi:hover { filter: brightness(0.95); }
  .hl-md { background: var(--risk-md-bg); box-shadow: inset 0 -2px 0 var(--risk-md); padding: 2px 3px; border-radius: 2px; cursor: pointer; }

  /* Context panel */
  .ctx { background: var(--paper-2); border-left: 1px solid var(--line); padding: 28px 24px; position: sticky; top: 0; height: 100vh; overflow-y: auto; transition: background 240ms ease, border-color 240ms ease; }

  /* Doc */
  .doc { font-size: 14px; line-height: 1.9; color: var(--ink); }
  .doc h4 { font-size: 15px; font-weight: 700; margin: 0 0 8px; }
  .doc p { margin: 0 0 20px; }

  /* Utility */
  .row { display: flex; } .col { display: flex; flex-direction: column; }
  .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
  .grow { flex: 1; } .between { justify-content: space-between; } .center { align-items: center; justify-content: center; }
  .ic-1 { align-items: center; }
  .sub { color: var(--ink-2); } .muted { color: var(--ink-3); }
  .fs-10 { font-size: 10px; } .fs-11 { font-size: 11px; } .fs-12 { font-size: 12px; } .fs-13 { font-size: 13px; }
  .fs-14 { font-size: 14px; } .fs-15 { font-size: 15px; } .fs-16 { font-size: 16px; } .fs-18 { font-size: 18px; }
  .fs-20 { font-size: 20px; } .fs-22 { font-size: 22px; } .fs-24 { font-size: 24px; } .fs-28 { font-size: 28px; } .fs-32 { font-size: 32px; }
  .fw-5 { font-weight: 500; } .fw-6 { font-weight: 600; } .fw-7 { font-weight: 700; } .fw-8 { font-weight: 800; }
  .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; } .mt-6 { margin-top: 24px; } .mt-8 { margin-top: 32px; }
  .tight { letter-spacing: -0.02em; }
  /* Korean line-break hygiene */
  .row.between > * { min-width: 0; }
  .nowrap { white-space: nowrap; }
  h1, h2, h3, h4, .fs-14, .fs-15, .fs-16, .fs-18, .fs-20, .fs-22, .fs-24, .fs-28, .fs-32 { word-break: keep-all; }
  /* Meta rows (date / count / label) should never break */
  .row.between > span, .row.between > .fs-11, .row.between > .fs-12, .row.between > .kicker, .row.between > .sub { white-space: nowrap; }
  /* Section headers in row.between: first child (title) nowrap, second (link) nowrap */
  .section-head { white-space: nowrap; }
  .lh-1 { line-height: 1.2; } .lh-2 { line-height: 1.5; } .lh-3 { line-height: 1.7; }
  .kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Toggle (for dark mode) */
  .toggle { width: 36px; height: 22px; border-radius: 11px; background: var(--line); position: relative; cursor: pointer; transition: background 180ms; flex-shrink: 0; }
  .toggle.on { background: var(--navy-2); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 180ms; }
  .toggle.on::after { transform: translateX(14px); }

  /* Tweaks */
  .tweaks-btn { position: fixed; bottom: 24px; right: 24px; z-index: 200; background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-1); color: var(--ink); font-family: inherit; }
  .tweaks-panel { position: fixed; bottom: 72px; right: 24px; z-index: 200; background: var(--paper); border: 1px solid var(--line); border-radius: 16px; padding: 18px; width: 260px; box-shadow: var(--shadow-2); }
  .tweaks-panel h3 { margin: 0 0 14px; font-size: 13px; font-weight: 700; }
  .tweaks-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; color: var(--ink); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: flex; align-items: center; justify-content: center; animation: fade 180ms ease both; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--paper); border-radius: 16px; padding: 28px; width: 480px; max-width: 92vw; box-shadow: var(--shadow-2); animation: pop 220ms cubic-bezier(0.2,0.8,0.2,1) both; }
  @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  /* Highlight scroll target */
  .hl-active { outline: 2px solid var(--navy-2); outline-offset: 3px; border-radius: 4px; }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="proto-web/app.jsx"></script>
</body>
</html>
